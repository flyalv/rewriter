opencollection: 1.0.0

info:
  name: Rewriter
config:
  protobuf:
    protoFiles:
      - type: file
        path: ../proto/rewrite.proto
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
